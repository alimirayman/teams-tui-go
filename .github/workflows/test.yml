name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    container: golang:1.25.0
    steps:
    - uses: actions/checkout@v5

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...
