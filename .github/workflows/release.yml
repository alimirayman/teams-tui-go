name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: CHANGES.md

      - name: Generate full CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
        env:
          OUTPUT: CHANGELOG.md

      - name: Commit and push CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B changelog-update origin/main
          # Re-apply the freshly generated CHANGELOG.md on top of latest main
          cp CHANGELOG.md /tmp/CHANGELOG.md.new
          git checkout CHANGELOG.md 2>/dev/null || true
          cp /tmp/CHANGELOG.md.new CHANGELOG.md
          git add CHANGELOG.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: update CHANGELOG.md for ${{ github.ref_name }} [skip ci]"
            git push origin changelog-update:main
          fi

  build-and-release:
    name: Build and Release
    needs: changelog
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p release-builds
          BINARY_NAME=teams-tui-go
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME=teams-tui-go.exe
          fi
          
          echo "Building for ${{ matrix.goos }}/${{ matrix.goarch }}..."
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o release-builds/${BINARY_NAME} .
          
          cd release-builds
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -r ../teams-tui-go-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.zip ${BINARY_NAME}
          else
            tar -czvf ../teams-tui-go-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz ${BINARY_NAME}
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ needs.changelog.outputs.release_body }}
          files: |
            teams-tui-go-*.tar.gz
            teams-tui-go-*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
