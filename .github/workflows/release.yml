name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate a changelog
        id: git-cliff
        run: |
          wget https://github.com/orhun/git-cliff/releases/download/v2.2.1/git-cliff-2.2.1-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf git-cliff-2.2.1-x86_64-unknown-linux-gnu.tar.gz
          ./git-cliff-2.2.1/git-cliff --config cliff.toml -vv --latest --strip header > CHANGES.md
          
          # Read the file and set it as a multi-line output variable for the next job
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "content<<$EOF" >> $GITHUB_OUTPUT
          cat CHANGES.md >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

  build-and-release:
    name: Build and Release
    needs: changelog
    runs-on: ubuntu-latest
    container: golang:1.25.0
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: apt-get update && apt-get install -y zip tar

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p release-builds
          BINARY_NAME=teams-tui-go
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME=teams-tui-go.exe
          fi
          
          echo "Building for ${{ matrix.goos }}/${{ matrix.goarch }}..."
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o release-builds/${BINARY_NAME} .
          
          cd release-builds
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -r ../teams-tui-go-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.zip ${BINARY_NAME}
          else
            tar -czvf ../teams-tui-go-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz ${BINARY_NAME}
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ needs.changelog.outputs.release_body }}
          files: |
            teams-tui-go-*.tar.gz
            teams-tui-go-*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
